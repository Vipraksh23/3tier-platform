<!DOCTYPE html>
<html>

<head>
    <title>3-Tier Platform</title>
</head>

<body>

<h1>🚀 3-Tier Platform</h1>

<h2>Frontend running successfully!</h2>

<button onclick="checkBackend()">Call Backend API</button>

<p id="result"></p>

<script>

const data = await response.text();

document.getElementById("result").innerHTML=data;

}

</script>
